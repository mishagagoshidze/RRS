<section id="form-room" class="content-section hidden">                                
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-indigo-700 p-8 text-white relative">
                <div class="relative z-10">
                    <h2 id="form-room-title" class="text-3xl font-extrabold tracking-tight">ახალი ოთახის დამატება/რედაქტირება</h2>
                    <p class="text-indigo-100 mt-2">შეავსეთ ინფორმაცია აუდიტორიის შესახებ</p>
                </div>
                <i class="fas fa-door-open absolute right-8 top-1/2 -translate-y-1/2 text-7xl text-white/10"></i>
            </div>
            <form id="form-main-user" action="/room/save" method="POST" class="p-8 space-y-6">
                <input id="form-room-id" type="hidden" name="id">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">ოთახის ნომერი</label>
                        <input id="form-room-number" type="text" name="number" placeholder="მაგ: N100" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">სართული</label>
                        <input id="form-room-floor" type="number" name="floor" placeholder="მაგ: 1" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">აღწერა / დეტალები</label>
                    <textarea id="form-room-description" name="description" rows="4" placeholder="მაგ: პროექტორი, 30 ადგილი..."
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all"></textarea>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">ოთახის ადმინისტრატორი</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-user-tie"></i>
                        </span>
                        <select id="form-room-user-id" name="user_id" 
                            class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all appearance-none bg-white">
                            <option value="" disabled selected>აირჩიეთ მომხმარებელი</option>
                            {% for u in users %}
                                <option value="{{ u.id }}">{{ u.first_name }} {{ u.last_name }} ({{ u.email }})</option>
                            {% endfor %}
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
                <div class="pt-4 flex gap-4">
                    <button type="button" onclick="showSection('rooms')" 
                        class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all">
                        გაუქმება
                    </button>
                    <button id="form-room-submit-btn" type="submit" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all">
                        <i class="fas fa-plus mr-2"></i> ოთახის შექმნა
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
