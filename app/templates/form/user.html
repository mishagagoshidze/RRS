<section id="form-user" class="content-section hidden">
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-indigo-700 p-8 text-white relative">
                <div class="relative z-10">
                    <h2 id="form-user-title" class="text-3xl font-extrabold tracking-tight">პროფილის დამატება/რედაქტირება</h2>
                </div>
                <i class="fas fa-user-shield absolute right-8 top-1/2 -translate-y-1/2 text-7xl text-white/10"></i>
            </div>
            <form id="form-main-user" action="/user/save" method="POST" class="p-8 space-y-6">
                <input id="form-user-id" type="hidden" name="id">
                <div id="form-user-email-field-container" class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">ელ-ფოსტა</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-envelope"></i>
                        </span>
                        <input id="form-user-email" type="email" name="email" placeholder="example@cue.edu.ge"
                            class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">სახელი</label>
                        <input id="form-user-first-name" type="text" name="first_name" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">გვარი</label>
                        <input id="form-user-last-name" type="text" name="last_name" required
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">ტელეფონი</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-phone"></i>
                        </span>
                        <input id="form-user-telephone" type="text" name="telephone"
                            class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                    </div>
                </div>                              
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">პაროლი</label>
                        <input id="form-user-password" type="password" name="password"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">დაადასტურეთ პაროლი</label>
                        <input id="form-user-confirm-password" type="password" name="confirm_password"
                            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                    </div>
                </div>
                <div id="form-user-admin-controls" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="flex items-center space-x-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
                        <input id="form-user-super-admin" type="checkbox" name="super_admin" 
                            class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500">
                        <label for="form-user-super-admin" class="text-sm font-bold text-slate-700">სუპერ ადმინი</label>
                    </div>                            
                    <div class="flex items-center space-x-3 p-3 bg-slate-50 rounded-xl border border-slate-200">
                        <input id="form-user-is-active" type="checkbox" name="is_active" 
                            class="w-5 h-5 text-indigo-600 rounded focus:ring-indigo-500">
                        <label for="form-user-is-active" class="text-sm font-bold text-slate-700">მომხმარებელი აქტიურია</label>
                    </div>
                </div> 
                <div class="pt-4 flex gap-4">
                    <button type="button" onclick="showSection('users')" 
                        class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all">
                        გაუქმება
                    </button>
                    <button id="form-user-submit-btn" type="submit" class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all">
                        <i class="fas fa-plus mr-2"></i> მომხმარებლის შექმნა
                    </button>
                </div>                            
            </form>
        </div>
    </div>
</section>
