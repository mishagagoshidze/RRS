<section id="form-event" class="content-section hidden">                                
    <div class="max-w-2xl mx-auto">
        <div class="bg-white rounded-3xl shadow-xl border border-slate-100 overflow-hidden">
            <div class="bg-indigo-700 p-8 text-white relative">
                <div class="relative z-10">
                    <h2 id="form-event-title" class="text-3xl font-extrabold tracking-tight">ახალი ჯავშნის დამატება</h2>
                    <p class="text-indigo-100 mt-2">შეავსეთ ინფორმაცია ოთახის დასაჯავშნად</p>
                </div>
                <i class="fas fa-calendar-alt absolute right-8 top-1/2 -translate-y-1/2 text-7xl text-white/10"></i>
            </div>
            <form id="form-main-event" action="/event/create" method="POST" class="p-8 space-y-6">
                <input id="form-event-id" type="hidden" name="id">                            
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">აირჩიეთ ოთახი</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-door-closed"></i>
                        </span>
                        <select id="form-event-room-id" name="room_id" required
                            class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all appearance-none bg-white text-slate-700">
                            <option value="" disabled selected>აირჩიეთ ოთახი</option>
                            {% for room in rooms %}
                                <option value="{{ room.id }}">{{ room.number }} - {{ room.description[:30] }}...</option>
                            {% endfor %}
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">მომხმარებელი</label>
                    <div class="relative">
                        <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                            <i class="fas fa-user text-sm"></i>
                        </span>
                        <select id="form-event-user-id" name="user_id" required
                            class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all appearance-none bg-white text-slate-700">
                            <option value="" disabled selected>ვინ ჯავშნის?</option>
                            {% for u in users %}
                                <option value="{{ u.id }}">{{ u.first_name }} {{ u.last_name }}</option>
                            {% endfor %}
                        </select>
                        <div class="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">
                            <i class="fas fa-chevron-down text-xs"></i>
                        </div>
                    </div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">დაწყების თარიღი</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                <i class="fas fa-clock"></i>
                            </span>
                            <input id="form-event-start_date" type="datetime-local" name="start_date" required
                                class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all text-slate-700">
                        </div>
                    </div>
                    <div class="space-y-2">
                        <label class="text-sm font-bold text-slate-700 ml-1">დასრულების თარიღი</label>
                        <div class="relative">
                            <span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">
                                <i class="fas fa-calendar-alt"></i>
                            </span>
                            <input id="form-event-end-date" type="datetime-local" name="end_date" required
                                class="w-full pl-11 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all text-slate-700">
                        </div>
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-slate-700 ml-1">ღონისძიების აღწერა</label>
                    <textarea id="form-event-description" name="description" rows="3" placeholder="დამატებითი დეტალები..."
                        class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all"></textarea>
                </div>
                <div class="pt-4 flex gap-4">
                    <button type="button" onclick="showSection('events')" 
                        class="w-1/3 bg-slate-100 hover:bg-slate-200 text-slate-600 font-bold py-4 rounded-2xl transition-all">
                        გაუქმება
                    </button>
                    <button id="form-event-submit-btn" type="submit" 
                        class="w-2/3 bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg shadow-indigo-200 transition-all flex items-center justify-center">
                        <i class="fas fa-save mr-2"></i> შენახვა
                    </button>
                </div>
            </form>
        </div>
    </div>
</section>
