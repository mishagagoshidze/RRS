<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>პაროლის აღდგენა</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>    
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">პაროლის აღდგენა</h2>
            <p class="text-slate-500 mt-2 text-sm">შეიყვანეთ თქვენი ელ-ფოსტა აღდგენის ბმულის მისაღებად</p>
        </div>
        <form action="/auth/forgot-password" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">ელ. ფოსტა</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required placeholder="example@cue.edu.ge"
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>
            {% if message %}
            <div class="error-message">
                <label>{{ message }}</label>
            </div>
            {% endif %}            
            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98]">
                ბმულის გაგზავნა
            </button>
        </form>
        <div class="mt-8 pt-6 border-t border-slate-50 text-center">
            <a href="/auth/login" class="text-indigo-600 hover:text-indigo-800 text-sm font-bold inline-flex items-center transition-colors">
                <i class="fas fa-arrow-left mr-2"></i> დაბრუნება შესვლაზე
            </a>
        </div>
    </div>

</body>
</html>
