<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ავტორიზაცია</title>
    <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
<div class="container">
    <form action="/auth/login" method="post" class="space-y-6">
        <h2>ავტორიზაცია</h2>
       
        <div class="form-group">
            <label class="block text-sm font-bold text-slate-700 mb-2">ელ. ფოსტა</label>            
            <div class="relative flex items-center"> <span class="absolute left-3 text-slate-400">
                    <i class="fas fa-envelope"></i>
                </span>            
                <input type="email" name="email" required placeholder="example@cue.edu.ge"
                    class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
            </div>
        </div>
        <div class="form-group">
            <label>პაროლი</label>
            <input type="password" name="password" required>
        </div>
        {% if message %}
        <div class="error-message">
            <label>{{ message }}</label>
        </div>
        {% endif %}
        <div class="forgot">
            <a href="/auth/forgot-password">დაგავიწყდა პაროლი?</a>
        </div>
        <button type="submit">შესვლა</button>
        <div class="link">
            არ გაქვს ანგარიში? <a href="/auth/register">რეგისტრაცია</a>
        </div>
    </form>



</div>
</body>
</html>
