{% include "header.html" %}

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">ავტორიზაცია</h2>
        </div>

        <form action="/auth/login" method="POST" class="space-y-6">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">ელ. ფოსტა</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-envelope"></i>
                    </span>
                    <input type="email" name="email" required placeholder="example@cue.edu.ge"
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">პაროლი</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" name="password" required placeholder="••••••••"
                        class="w-full pl-10 pr-4 py-3 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            {% if message %}
            <div class="text-red-500 text-sm font-medium text-center">
                {{ message }}
            </div>
            {% endif %}

            <div class="flex justify-end">
                <a href="/auth/forgot-password" class="text-indigo-600 hover:text-indigo-800 text-sm font-bold transition-colors">
                    დაგავიწყდა პაროლი?
                </a>
            </div>

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98]">
                შესვლა
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-slate-50 text-center">
            <p class="text-slate-600 text-sm">
                არ გაქვს ანგარიში? 
                <a href="/auth/register" class="text-indigo-600 hover:text-indigo-800 font-bold ml-1 transition-colors">რეგისტრაცია</a>
            </p>
        </div>
    </div>

{% include "footer.html" %}
