{% include "header.html" %}

    <div class="bg-white p-8 rounded-2xl shadow-xl w-full max-w-md">
        <div class="text-center mb-8">
            <h2 class="text-2xl font-bold text-slate-800">რეგისტრაცია</h2>
        </div>

        <form action="/auth/register" method="POST" class="space-y-4">
            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">ელ. ფოსტა</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400"><i class="fas fa-envelope"></i></span>
                    <input type="email" name="email" value="{{ email }}" required placeholder="example@cue.edu.ge"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">პაროლი</label>
                    <input type="password" name="password" minlength="6" required placeholder="••••••"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">გაიმეორეთ</label>
                    <input type="password" name="confirm_password" minlength="6" required placeholder="••••••"
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">სახელი</label>
                    <input type="text" name="first_name" value="{{ first_name }}" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-2">გვარი</label>
                    <input type="text" name="last_name" value="{{ last_name }}" required
                        class="w-full px-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            <div>
                <label class="block text-sm font-bold text-slate-700 mb-2">ტელეფონი</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 pl-3 flex items-center text-slate-400"><i class="fas fa-phone"></i></span>
                    <input type="tel" name="telephone" value="{{ telephone }}" required placeholder="+995"
                        class="w-full pl-10 pr-4 py-2.5 rounded-xl border border-slate-200 focus:ring-4 focus:ring-indigo-500/10 focus:border-indigo-500 outline-none transition-all">
                </div>
            </div>

            {% if message %}
            <div class="text-red-500 text-sm font-medium text-center">
                {{ message }}
            </div>
            {% endif %}

            <button type="submit" 
                class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-xl shadow-lg shadow-indigo-100 transition-all active:scale-[0.98] mt-4">
                რეგისტრაცია
            </button>
        </form>

        <div class="mt-6 pt-6 border-t border-slate-50 text-center">
            <p class="text-slate-600 text-sm">
                უკვე გაქვს ანგარიში? 
                <a href="/auth/login" class="text-indigo-600 hover:text-indigo-800 font-bold ml-1 transition-colors">შესვლა</a>
            </p>
        </div>
    </div>

{% include "footer.html" %}
